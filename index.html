<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DR Farmacias - Panel de Control</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 600: '#008080', 700: '#006666' },
            beige: { 100: '#F5F5DC', 50: '#FAFAEE' }
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-beige-100 font-sans text-gray-800 pb-20 selection:bg-teal-600 selection:text-white">

  <header class="bg-teal-600 text-beige-50 p-4 shadow-md sticky top-0 z-50 gsap-header">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">DR Farmacias</h1>
      <div class="w-8 h-8 bg-beige-100 rounded-full flex items-center justify-center text-teal-700 font-bold">DR</div>
    </div>
    <div class="mt-2 text-xs flex items-center gap-2 bg-teal-700 w-fit px-2 py-1 rounded">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
      Live Database: Supabase (Mockaroo)
    </div>
  </header>

  <main class="p-4 space-y-6">

    <div id="vista-dashboard" class="space-y-6">
      <section class="grid grid-cols-2 gap-3">
        <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-teal-600 metric-card">
          <p class="text-xs text-gray-500 font-semibold">Capital Inmovilizado</p>
          <p class="text-lg font-bold text-teal-700" id="metric-capital">$0</p>
        </div>
        <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-teal-600 metric-card">
          <p class="text-xs text-gray-500 font-semibold">Ganancia Proyectada</p>
          <p class="text-lg font-bold text-teal-700" id="metric-ganancia">$0</p>
        </div>
        <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-red-500 col-span-2 metric-card">
          <p class="text-xs text-gray-500 font-semibold">Mermas (Vencidos)</p>
          <p class="text-lg font-bold text-red-600" id="metric-mermas">-$0</p>
        </div>
      </section>

      <section class="bg-white p-4 rounded-xl shadow-sm chart-container">
        <h2 class="text-sm font-bold text-gray-700 mb-4 text-center">Riesgo de Inventario por Vencimiento</h2>
        <div class="relative h-48 w-full">
          <canvas id="riskChart"></canvas>
        </div>
      </section>
    </div>

    <div id="vista-inventario" class="hidden space-y-4">
      <div class="sticky top-20 z-40 bg-beige-100 py-2">
        <input type="text" placeholder="Buscar en inventario..." class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:border-teal-600 shadow-sm search-bar">
      </div>
      
      <div id="product-list" class="space-y-3 mt-2">
        </div>
    </div>

  </main>

  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 z-50">
    <button id="btn-dashboard" class="flex flex-col items-center text-teal-600 w-1/3">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
      <span class="text-[10px] mt-1 font-semibold">Panel</span>
    </button>
    <button id="btn-inventario" class="flex flex-col items-center text-gray-400 hover:text-teal-600 w-1/3">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      <span class="text-[10px] mt-1 font-semibold">Inventario</span>
    </button>
    <button id="btn-reportes" class="flex flex-col items-center text-gray-400 hover:text-teal-600 w-1/3">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      <span class="text-[10px] mt-1 font-semibold">Reportes</span>
    </button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
