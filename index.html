<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DR Farmacias - Panel de Control</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 600: '#008080', 700: '#006666' },
            beige: { 100: '#F5F5DC', 50: '#FAFAEE' }
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-beige-100 font-sans text-gray-800 pb-20 selection:bg-teal-600 selection:text-white">

  <header class="bg-teal-600 text-beige-50 p-4 shadow-md sticky top-0 z-50 gsap-header">
    <div class="flex justify-between items-center">
      <h1 class="text-xl font-bold">DR Farmacias</h1>
      <div class="w-8 h-8 bg-beige-100 rounded-full flex items-center justify-center text-teal-700 font-bold">DR</div>
    </div>
    <div class="mt-2 text-xs flex items-center gap-2 bg-teal-700 w-fit px-2 py-1 rounded">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
      Live Database: Supabase (Mockaroo)
    </div>
  </header>

  <main class="p-4 space-y-6">

    <section class="grid grid-cols-2 gap-3">
      <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-teal-600 metric-card">
        <p class="text-xs text-gray-500 font-semibold">Capital Inmovilizado</p>
        <p class="text-lg font-bold text-teal-700" id="metric-capital">$0</p>
      </div>
      <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-teal-600 metric-card">
        <p class="text-xs text-gray-500 font-semibold">Ganancia Proyectada</p>
        <p class="text-lg font-bold text-teal-700" id="metric-ganancia">$0</p>
      </div>
      <div class="bg-white p-3 rounded-xl shadow-sm border-t-2 border-red-500 col-span-2 metric-card">
        <p class="text-xs text-gray-500 font-semibold">Mermas (Vencidos)</p>
        <p class="text-lg font-bold text-red-600" id="metric-mermas">-$0</p>
      </div>
    </section>

    <section class="bg-white p-4 rounded-xl shadow-sm chart-container">
      <h2 class="text-sm font-bold text-gray-700 mb-4 text-center">Riesgo de Inventario por Vencimiento</h2>
      <div class="relative h-48 w-full">
        <canvas id="riskChart"></canvas>
      </div>
    </section>

    <section>
      <div class="sticky top-20 z-40 bg-beige-100 py-2">
        <input type="text" placeholder="Buscar en inventario..." class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:border-teal-600 shadow-sm search-bar">
      </div>
      
      <div id="product-list" class="space-y-3 mt-2">
        </div>
    </section>

  </main>

  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-safe z-50">
    <button class="flex flex-col items-center text-teal-600">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
      <span class="text-[10px] mt-1 font-semibold">Panel</span>
    </button>
    <button class="flex flex-col items-center text-gray-400 hover:text-teal-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      <span class="text-[10px] mt-1">Inventario</span>
    </button>
    <button class="flex flex-col items-center text-gray-400 hover:text-teal-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      <span class="text-[10px] mt-1">Reportes</span>
    </button>
  </nav>

  <script>
    // 1. Datos simulados (Acá es donde luego conectarás con la API de Supabase)
    const mockData = [
      { id: 1, nombre: "Ibuprofeno 600mg", categoria: "Medicamentos", stock: 150, costo: 1000, estado: "VIGENTE" },
      { id: 2, nombre: "Protector Solar FPS50", categoria: "Dermocosmética", stock: 30, costo: 2500, estado: "PRÓXIMO" },
      { id: 3, nombre: "Jarabe Antitusivo", categoria: "Medicamentos", stock: 10, costo: 640, estado: "VENCIDO" },
      { id: 4, nombre: "Amoxicilina 500mg", categoria: "Medicamentos", stock: 80, costo: 1200, estado: "VIGENTE" }
    ];

    const MARKUP = 1.40; // 40% de ganancia

    // 2. Funciones de Renderizado Financiero
    function formatCurrency(value) {
      return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(value);
    }

    function renderDashboardMetrics(data) {
      let capital = 0;
      let ganancia = 0;
      let mermas = 0;

      data.forEach(item => {
        const valorCosto = item.costo * item.stock;
        const valorVenta = valorCosto * MARKUP;
        
        if (item.estado === "VENCIDO") {
          mermas += valorCosto;
        } else {
          capital += valorCosto;
          ganancia += (valorVenta - valorCosto);
        }
      });

      // Animación de contador con GSAP
      gsap.to("#metric-capital", { innerHTML: capital, duration: 1.5, snap: { innerHTML: 1 }, onUpdate: function() { document.getElementById("metric-capital").innerHTML = formatCurrency(this.targets()[0].innerHTML); } });
      gsap.to("#metric-ganancia", { innerHTML: ganancia, duration: 1.5, snap: { innerHTML: 1 }, onUpdate: function() { document.getElementById("metric-ganancia").innerHTML = formatCurrency(this.targets()[0].innerHTML); } });
      gsap.to("#metric-mermas", { innerHTML: mermas, duration: 1.5, snap: { innerHTML: 1 }, onUpdate: function() { document.getElementById("metric-mermas").innerHTML = "-" + formatCurrency(this.targets()[0].innerHTML); } });
    }

    function renderProductList(data) {
      const container = document.getElementById('product-list');
      container.innerHTML = '';

      data.forEach(item => {
        let badgeColor = item.estado === 'VIGENTE' ? 'bg-green-100 text-green-800' : 
                         item.estado === 'PRÓXIMO' ? 'bg-amber-100 text-amber-800' : 
                         'bg-red-100 text-red-800';

        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-xl shadow-sm product-card border-l-4 " + 
                         (item.estado === 'VIGENTE' ? 'border-green-500' : item.estado === 'PRÓXIMO' ? 'border-amber-500' : 'border-red-500');
        
        card.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="font-bold text-gray-800 leading-tight">${item.nombre}</h3>
              <p class="text-xs text-gray-500">${item.categoria}</p>
            </div>
            <span class="px-2 py-1 text-[10px] font-bold rounded-md ${badgeColor}">${item.estado}</span>
          </div>
          <div class="flex justify-between items-end mt-3 border-t border-gray-100 pt-2">
            <div>
              <p class="text-xs text-gray-400">Stock: <span class="font-bold text-gray-700">${item.stock} u.</span></p>
            </div>
            <div class="text-right">
              <p class="text-xs text-gray-400">PVP (+40%)</p>
              <p class="font-bold text-teal-700">${formatCurrency(item.costo * MARKUP)}</p>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // Animar la lista al renderizar
      gsap.from(".product-card", { opacity: 0, y: 20, duration: 0.4, stagger: 0.1, ease: "power1.out" });
    }

    // 3. Configuración del Gráfico (Chart.js)
    function initChart(data) {
      const ctx = document.getElementById('riskChart').getContext('2d');
      const conteo = { VIGENTE: 0, PRÓXIMO: 0, VENCIDO: 0 };
      data.forEach(item => conteo[item.estado] += item.stock);

      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Vigente', 'Próximo a Vencer', 'Vencido'],
          datasets: [{
            data: [conteo.VIGENTE, conteo.PRÓXIMO, conteo.VENCIDO],
            backgroundColor: ['#10B981', '#F59E0B', '#EF4444'], // Colores Tailwind
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } },
          cutout: '70%'
        }
      });
    }

    // 4. Inicialización
    document.addEventListener("DOMContentLoaded", () => {
      // Animaciones iniciales GSAP
      gsap.from(".gsap-header", { y: -50, opacity: 0, duration: 0.8, ease: "power2.out" });
      gsap.from(".metric-card", { opacity: 0, scale: 0.9, duration: 0.6, stagger: 0.1, delay: 0.3 });
      gsap.from(".chart-container", { opacity: 0, x: -20, duration: 0.6, delay: 0.5 });
      gsap.from(".search-bar", { opacity: 0, duration: 0.5, delay: 0.7 });

      // Cargar datos
      renderDashboardMetrics(mockData);
      renderProductList(mockData);
      initChart(mockData);
    });
  </script>
</body>
</html>
