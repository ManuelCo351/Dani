<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DR Farmacias - Sistema Inteligente</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 500: '#00a3a3', 600: '#008080', 700: '#005959', 900: '#003333' },
            beige: { 50: '#FDFDF6', 100: '#F5F5DC', 200: '#E8E8CA' },
            dark: '#121212'
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.5rem'
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,128,128,0.1)',
            'glass': '0 8px 32px 0 rgba(0,0,0,0.05)'
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-beige-50 text-dark font-sans antialiased overflow-x-hidden selection:bg-teal-600 selection:text-beige-50">

  <div class="max-w-md mx-auto min-h-screen bg-beige-100 relative pb-28 shadow-2xl overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-20%] w-72 h-72 bg-teal-500/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute top-[20%] right-[-20%] w-72 h-72 bg-beige-200/60 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>

    <header class="sticky top-0 z-50 px-6 py-5 bg-white/60 backdrop-blur-md border-b border-white/40 gsap-header">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-extrabold tracking-tight text-teal-900">DR Farmacias</h1>
          <div class="flex items-center gap-2 mt-1">
            <span class="relative flex h-2.5 w-2.5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-teal-500"></span>
            </span>
            <p class="text-[10px] font-bold text-teal-600 uppercase tracking-wider">Sync: Google Sheets</p>
          </div>
        </div>
        <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-teal-600 to-teal-400 p-[2px] shadow-soft">
          <div class="w-full h-full bg-beige-50 rounded-full flex items-center justify-center border-2 border-transparent">
            <span class="text-sm font-black text-teal-700">DR</span>
          </div>
        </div>
      </div>
    </header>

    <main class="relative z-10 px-4 pt-6">

      <div id="vista-dashboard" class="grid grid-cols-2 gap-4">
        
        <div class="col-span-2 bg-white/80 backdrop-blur-sm p-6 rounded-4xl shadow-glass border border-white gsap-bento">
          <p class="text-xs font-semibold text-teal-600 uppercase tracking-widest mb-1">Capital Inmovilizado</p>
          <h2 class="text-4xl font-black text-teal-900 tracking-tighter" id="val-capital">$0</h2>
          <p class="text-xs text-gray-500 mt-2 font-medium">Costo de droguería total</p>
        </div>

        <div class="col-span-1 bg-gradient-to-br from-teal-600 to-teal-800 p-5 rounded-4xl shadow-soft text-beige-50 gsap-bento">
          <div class="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center mb-3 backdrop-blur-md">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
          </div>
          <p class="text-[10px] font-bold text-teal-100 uppercase tracking-wider mb-1">Ganancia (+40%)</p>
          <h3 class="text-xl font-extrabold tracking-tight" id="val-ganancia">$0</h3>
        </div>

        <div class="col-span-1 bg-white/80 backdrop-blur-sm p-5 rounded-4xl shadow-glass border border-white gsap-bento">
          <div class="bg-red-100 w-8 h-8 rounded-full flex items-center justify-center mb-3">
            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <p class="text-[10px] font-bold text-red-400 uppercase tracking-wider mb-1">Riesgo Vencido</p>
          <h3 class="text-xl font-extrabold text-red-600 tracking-tight" id="val-mermas">$0</h3>
        </div>

        <div class="col-span-2 bg-white/80 backdrop-blur-sm p-6 rounded-4xl shadow-glass border border-white mt-2 gsap-bento">
          <div class="flex justify-between items-end mb-4">
            <div>
              <h3 class="font-bold text-teal-900">Salud del Inventario</h3>
              <p class="text-xs text-gray-500 font-medium">Distribución por vencimiento</p>
            </div>
          </div>
          <div class="relative h-48 w-full flex items-center justify-center">
            <canvas id="donutChart"></canvas>
          </div>
        </div>

      </div>

      <div id="vista-inventario" class="hidden">
        
        <div class="sticky top-20 z-40 pb-4 gsap-inv-header">
          <div class="relative bg-white/90 backdrop-blur-md rounded-2xl shadow-glass border border-white p-2 flex items-center">
            <svg class="w-5 h-5 text-teal-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" placeholder="Buscar medicamento o categoría..." class="w-full bg-transparent border-none focus:ring-0 text-sm font-medium text-dark px-3 py-2 placeholder-gray-400 outline-none">
          </div>
        </div>

        <div id="product-list" class="flex flex-col gap-3 pb-6">
          <div class="animate-pulse flex gap-4 bg-white/50 p-4 rounded-3xl">
            <div class="w-12 h-12 bg-teal-200/50 rounded-2xl"></div>
            <div class="flex-1 space-y-2 py-1">
              <div class="h-4 bg-teal-200/50 rounded w-3/4"></div>
              <div class="h-3 bg-teal-200/50 rounded w-1/2"></div>
            </div>
          </div>
        </div>

      </div>

    </main>

    <nav class="fixed bottom-6 left-0 right-0 z-50 px-6 gsap-nav">
      <div class="bg-dark backdrop-blur-xl bg-opacity-90 rounded-full px-6 py-3 flex justify-between items-center shadow-2xl border border-white/10">
        
        <button id="btn-dashboard" class="nav-btn group flex items-center gap-2 px-4 py-2 rounded-full bg-teal-500 text-white transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
          <span class="text-sm font-bold w-16 overflow-hidden transition-all duration-300">Panel</span>
        </button>

        <button id="btn-inventario" class="nav-btn group flex items-center gap-2 px-4 py-2 rounded-full text-gray-400 hover:text-white transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          <span class="text-sm font-bold w-0 overflow-hidden opacity-0 transition-all duration-300">Stock</span>
        </button>

        <button class="nav-btn group flex items-center gap-2 px-4 py-2 rounded-full text-gray-400 hover:text-white transition-all duration-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span class="text-sm font-bold w-0 overflow-hidden opacity-0 transition-all duration-300">Ajustes</span>
        </button>

      </div>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
